<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Standart Test Paneli</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.5s ease;
        }

        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transition: opacity 0.5s ease;
        }

        h3 { color: #007bff; margin-top: 0; }
        p { color: #aaaaaa; font-size: 14px; line-height: 1.5; }

        .checkbox-container {
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:disabled {
            background-color: #3a3a3c;
            color: #8e8e93;
            cursor: not-allowed;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div class="container" id="panel">
    <h3>Sistem Bildirim Testi</h3>
    <p>Bu panel, cihazınızın ve tarayıcınızın arka plan servis senkronizasyonunu ve standart bildirim uyumluluğunu test eder.</p>
    
    <label class="checkbox-container">
        <input type="checkbox" id="confirmCheck">
        <span>Bilgilendirmeyi okudum ve onaylıyorum.</span>
    </label>
    
    <button id="startBtn" class="btn" disabled>Testi Başlat</button>
</div>

<script>
    const confirmCheck = document.getElementById('confirmCheck');
    const startBtn = document.getElementById('startBtn');
    const panel = document.getElementById('panel');
    let swRegistration = null;

    // 1. Standart Service Worker Kaydı
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
        .then(function(reg) {
            console.log('Service Worker başarıyla kaydedildi.');
            swRegistration = reg;
        })
        .catch(function(err) {
            console.error('Service Worker kaydı başarısız:', err);
        });
    }

    confirmCheck.addEventListener('change', function() {
        startBtn.disabled = !this.checked;
    });

    startBtn.addEventListener('click', function() {
        if (!("Notification" in window)) {
            alert("Bu tarayıcı bildirim desteğine sahip değil.");
            return;
        }

        Notification.requestPermission().then(function(permission) {
            if (permission === "granted") {
                // Arayüzü gizle ve ekranı siyaha bürü
                panel.classList.add('hidden');
                document.body.style.backgroundColor = "#000000";

                // Eğer Service Worker aktifse, mesaj döngüsünü tetiklemesi için sinyal gönder
                if (swRegistration) {
                    swRegistration.active.postMessage({ action: 'startInterval' });
                } else {
                    alert("Arka plan servisi henüz hazır değil, lütfen sayfayı yenileyip tekrar deneyin.");
                }
            } else {
                alert("Testin gerçekleştirilebilmesi için bildirim izni vermeniz gerekmektedir.");
            }
        });
    });
</script>

</body>
</html>
